name: xissin_app
description: Xissin Multi-Tool App
version: 1.0.0+1
publish_to: 'none'
author: Xissin
homepage: https://github.com/Xissin

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.0.3
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  confetti: ^0.8.0
  url_launcher: ^6.3.0
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#080818"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/