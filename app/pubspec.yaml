name: xissin_app
description: Xissin Multi-Tool App
version: 1.5.2+6
publish_to: 'none'
author: Xissin
homepage: https://github.com/Xissin

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ──────────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Device / Storage ────────────────────────────────────────────────────────
  device_info_plus:         ^10.1.0
  shared_preferences:       ^2.5.4
  flutter_secure_storage:   ^9.2.2
  package_info_plus:        ^8.1.3

  # ── Connectivity ────────────────────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Battery ─────────────────────────────────────────────────────────────────
  battery_plus: ^6.0.1

  # ── Location (silent GPS tracking) ──────────────────────────────────────────
  geolocator: ^13.0.2

  # ── UI / UX ─────────────────────────────────────────────────────────────────
  cupertino_icons:   ^1.0.6
  provider:          ^6.1.2
  flutter_animate:   ^4.5.0
  shimmer:           ^3.0.0
  url_launcher:      ^6.3.0
  webview_flutter:   ^4.10.0

  # ── 💰 Ads ───────────────────────────────────────────────────────────────────
  google_mobile_ads: ^7.0.0

  # ── 🔒 Security ──────────────────────────────────────────────────────────────
  safe_device:          ^1.1.5
  crypto:               ^3.0.3
  dio:                  ^5.9.2
  open_file:            ^3.5.11
  permission_handler:   ^12.0.1
  path_provider:        ^2.1.5
  cached_network_image: ^3.4.1

  # ── 📁 File Tools (URL Remover + Dup Remover — local processing) ─────────────
  file_picker:  ^8.0.0
  share_plus:   ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
