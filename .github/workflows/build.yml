name: 🚀 Build Xissin APK

on:
  push:
    tags:
      - 'v*.*.*'

# ✅ THIS IS THE FIX — gives the token permission to create releases
permissions:
  contents: write

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ──────────────────────────────────────────────────────
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Flutter ───────────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      # ── 4. Decode Keystore ─────────────────────────────────────────────────
      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/app/android/xissin-release.jks

      # ── 5. Create key.properties ───────────────────────────────────────────
      - name: 📝 Create key.properties
        run: |
          cat > $GITHUB_WORKSPACE/app/android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=$GITHUB_WORKSPACE/app/android/xissin-release.jks
          EOF

      # ── 6. Get Flutter packages ────────────────────────────────────────────
      - name: 📦 Flutter Pub Get
        working-directory: app
        run: flutter pub get

      # ── 7. Build Release APK ───────────────────────────────────────────────
      - name: 🔨 Build Release APK
        working-directory: app
        run: flutter build apk --release

      # ── 8. Rename APK with tag version ────────────────────────────────────
      - name: 📋 Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv app/build/app/outputs/flutter-apk/app-release.apk \
             app/build/app/outputs/flutter-apk/Xissin-${TAG}.apk

      # ── 9. Upload APK as artifact ──────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xissin-APK-${{ github.ref_name }}
          path: app/build/app/outputs/flutter-apk/Xissin-*.apk
          retention-days: 30

      # ── 10. Create GitHub Release ──────────────────────────────────────────
      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/Xissin-*.apk
          name: Xissin ${{ github.ref_name }}
          body: |
            ## 🚀 Xissin ${{ github.ref_name }}
            
            ### 📲 How to Install
            1. Download the APK file below
            2. Open it on your Android phone
            3. Tap **Install** (enable Unknown Sources if prompted)
            
            ### 📢 Updates & Announcements
            Join our Telegram: https://t.me/Xissin_0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Notify Telegram on success ─────────────────────────────────────
      - name: Notify Telegram Success
        if: success()
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          URL="https://github.com/Xissin/xissin-monorepo/releases/tag/${TAG}"
          MSG="Xissin ${TAG} is now LIVE!%0A%0AVersion: ${TAG}%0ABuilt: ${DATE}%0A%0ADownload APK:%0A${URL}%0A%0AChannel: @Xissin_0"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"             -d "text=${MSG}"

      # ── 12. Notify Telegram on failure ─────────────────────────────────────
      - name: Notify Telegram Failure
        if: failure()
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          LOGS="https://github.com/Xissin/xissin-monorepo/actions"
          MSG="Xissin ${TAG} Build FAILED!%0A%0ATime: ${DATE}%0A%0ACheck logs:%0A${LOGS}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"             -d "text=${MSG}"