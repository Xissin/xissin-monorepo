name: 🚀 Build Xissin APK

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.0.1, v2.0.0 etc.

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ──────────────────────────────────────────────────────
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Flutter ───────────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      # ── 4. Decode Keystore ─────────────────────────────────────────────────
      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/app/android/xissin-release.jks

      # ── 5. Create key.properties ───────────────────────────────────────────
      - name: 📝 Create key.properties
        run: |
          cat > $GITHUB_WORKSPACE/app/android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=$GITHUB_WORKSPACE/app/android/xissin-release.jks
          EOF

      # ── 6. Get Flutter packages ────────────────────────────────────────────
      - name: 📦 Flutter Pub Get
        working-directory: app
        run: flutter pub get

      # ── 7. Build Release APK ───────────────────────────────────────────────
      - name: 🔨 Build Release APK
        working-directory: app
        run: flutter build apk --release

      # ── 8. Rename APK with tag version ────────────────────────────────────
      - name: 📋 Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv app/build/app/outputs/flutter-apk/app-release.apk \
             app/build/app/outputs/flutter-apk/Xissin-${TAG}.apk

      # ── 9. Upload APK as artifact ──────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xissin-APK-${{ github.ref_name }}
          path: app/build/app/outputs/flutter-apk/Xissin-*.apk
          retention-days: 30

      # ── 10. Create GitHub Release ──────────────────────────────────────────
      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/Xissin-*.apk
          name: Xissin ${{ github.ref_name }}
          body: |
            ## 🚀 Xissin ${{ github.ref_name }}
            
            ### 📲 How to Install
            1. Download the APK file below
            2. Open it on your Android phone
            3. Tap **Install** (enable Unknown Sources if prompted)
            
            ### 📢 Updates & Announcements
            Join our Telegram: https://t.me/Xissin_0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Notify Telegram on success ─────────────────────────────────────
      - name: 📲 Notify Telegram
        if: success()
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DATE=$(date +'%Y-%m-%d %H:%M')
          MESSAGE="✅ *Xissin ${TAG} Released!*%0A%0A📦 Version: ${TAG}%0A🕐 Time: ${DATE}%0A%0A🔗 Download APK:%0Ahttps://github.com/Xissin/xissin-monorepo/releases/tag/${TAG}%0A%0A📢 Share on: @Xissin_0"
          curl -s -X POST "https://api.telegram.org/bot8282381783:AAHs_2v8UGgNM48y1EulMhovNUkTw4ntpjY/sendMessage" \
            -d "chat_id=1910648163" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      # ── 12. Notify Telegram on failure ─────────────────────────────────────
      - name: ❌ Notify Telegram on Failure
        if: failure()
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DATE=$(date +'%Y-%m-%d %H:%M')
          MESSAGE="❌ *Xissin ${TAG} Build FAILED!*%0A%0A🕐 Time: ${DATE}%0A🔗 Check logs: https://github.com/Xissin/xissin-monorepo/actions%0A%0A_Please check the error logs._"
          curl -s -X POST "https://api.telegram.org/bot8282381783:AAHs_2v8UGgNM48y1EulMhovNUkTw4ntpjY/sendMessage" \
            -d "chat_id=1910648163" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"